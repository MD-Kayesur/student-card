<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dynamic Student Card Generator</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <style>
    body {
      background-color: #f3f4f6;
      font-family: 'Inter', sans-serif;
    }

    .container-wrapper {
      display: grid;
      grid-template-columns: 500px 1fr;
      gap: 40px;
      padding: 40px;
      max-width: 1800px;
      margin: 0 auto;
      align-items: start;
    }

    .editor-container {
      background: white;
      border-radius: 20px;
      box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1);
      overflow: hidden;
    }

    .tabs {
      display: flex;
      background: #f8fafc;
      border-bottom: 2px solid #e5e7eb;
    }

    .tab-btn {
      flex: 1;
      padding: 18px;
      font-size: 11px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: #64748b;
      transition: all 0.2s;
      cursor: pointer;
      text-align: center;
    }

    .tab-btn.active {
      color: #3b82f6;
      background: white;
      border-bottom: 3px solid #3b82f6;
      margin-bottom: -2px;
    }

    .form-content {
      padding: 25px;
      max-height: 88vh;
      overflow-y: auto;
    }

    .input-group {
      margin-bottom: 24px;
      padding: 15px;
      background: #f8fafc;
      border-radius: 12px;
      border: 1px solid #f1f5f9;
    }

    .input-group label {
      display: block;
      font-size: 10px;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #1e3a8a;
      margin-bottom: 12px;
      border-left: 4px solid #3b82f6;
      padding-left: 10px;
    }

    .input-group input,
    .input-group select {
      width: 100%;
      padding: 8px 12px;
      border: 1.5px solid #e2e8f0;
      border-radius: 10px;
      font-size: 12px;
      transition: border-color 0.2s;
      background: white;
    }

    .style-controls {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
      margin-top: 15px;
      padding-top: 15px;
      border-top: 1px dashed #e2e8f0;
    }

    .style-item {
      display: flex;
      flex-direction: column;
    }

    .style-item label {
      font-size: 7px;
      font-weight: 800;
      color: #94a3b8;
      margin-bottom: 4px;
      text-transform: uppercase;
    }

    .style-item input,
    .style-item select {
      padding: 4px 6px !important;
      font-size: 10px !important;
      border-radius: 6px !important;
      border-width: 1px !important;
      height: 28px;
    }

    /* Card Styles */
    .full {
      height: 600px;
      width: 500px;
      background-color: blue;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 20px;
      padding: 20px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.2);
    }

    .inside {
      background-color: white;
      padding: 10px;
      height: 480px;
      width: 280px;
      text-align: center;
      border-radius: 12px;
      position: relative;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    .back-card::before {
      content: "";
      position: absolute;
      inset: 0;
      background-image: url("Screenshot_3.png");
      background-repeat: no-repeat;
      background-size: cover;
      opacity: 0.2;
      z-index: 1;
    }

    .collage-logo-img {
      height: 40px;
      margin: 0 auto;
      z-index: 2;
      position: relative;
    }

    .c-el {
      z-index: 2;
      position: relative;
      display: block;
      box-sizing: border-box;
    }

    .collage-name {
      margin-top: 5px;
      color: #000;
      padding: 0 10px;
    }

    .img-section {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 220px;
      margin-top: 10px;
      padding: 0 10px;
      gap: 15px;
      z-index: 2;
      position: relative;
    }

    .img-text {
      color: blue;
      white-space: nowrap;
      writing-mode: vertical-rl;
      transform: rotate(180deg);
      height: 100%;
      display: flex;
      align-items: center;
    }

    .my-img-container {
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      border: 2px solid blue;
    }

    .my-img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .my-name {
      margin-top: 8px;
      color: #000;
      padding: 0 10px;
    }

    .details {
      text-align: left;
      margin-left: 20px;
      margin-top: 8px;
      line-height: 1.5;
      padding-right: 10px;
    }

    .sin-img-container {
      margin-top: auto;
      padding-bottom: 15px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .sin-img {
      height: 25px;
      object-fit: contain;
    }

    .principal {
      margin-top: 4px;
      border-top: 1px solid #000;
      padding-top: 3px;
      width: 80%;
      display: inline-block;
      font-size: 8px;
      font-weight: 800;
    }

    .back-content {
      z-index: 2;
      position: relative;
      height: 100%;
      padding: 10px;
      display: flex;
      flex-direction: column;
    }

    .back-title {
      color: #076cf9;
      margin-top: 5px;
      padding: 0 10px;
    }

    .back-title::after {
      content: "";
      display: block;
      width: 50%;
      height: 2px;
      background: #02db2d;
      margin: 4px auto;
      border-radius: 10px;
    }

    .subjects-list {
      text-align: left;
      margin-top: 15px;
      padding: 0 15px;
      line-height: 1.8;
    }

    .return-section {
      margin-top: auto;
      border-top: 1.5px solid #000;
      padding-top: 6px;
      margin-bottom: 6px;
      padding-left: 10px;
      padding-right: 10px;
    }

    .return-title {
      font-weight: 900;
      margin-bottom: 2px;
    }

    .contact-info {
      margin-top: 10px;
      line-height: 1.6;
      padding: 0 10px;
    }

    .subject-row {
      display: grid;
      grid-template-columns: 80px 1fr 30px;
      gap: 8px;
      margin-bottom: 6px;
    }

    .remove-btn {
      color: #ef4444;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .hidden {
      display: none !important;
    }
  </style>
</head>

<body>
  <div class="container-wrapper">
    <div class="editor-container">
      <div class="tabs">
        <div class="tab-btn active" onclick="switchSide('front')">FRONT SETUP</div>
        <div class="tab-btn" onclick="switchSide('back')">BACK SETUP</div>
      </div>

      <div class="form-content">
        <div id="form-front">
          <!-- Collage Name -->
          <div class="input-group">
            <label>Institution Name</label>
            <input type="text" id="in-collage" value="MOHASIN COLLAGE">
            <div class="style-controls" id="sc-collage"></div>
          </div>

          <!-- Dept -->
          <div class="input-group">
            <label>Sidebar Dept Title</label>
            <input type="text" id="in-dept" value="BANGLA DEPARTMENT">
            <div class="style-controls" id="sc-dept"></div>
          </div>

          <!-- Student Image -->
          <div class="input-group">
            <label>Student Photo</label>
            <input type="file" id="up-photo">
            <div class="style-controls" id="sc-photo"></div>
          </div>

          <!-- Student Name -->
          <div class="input-group">
            <label>Student Name</label>
            <input type="text" id="in-name" value="MD Kayesur Rahman">
            <div class="style-controls" id="sc-name"></div>
          </div>

          <!-- Details -->
          <div class="input-group">
            <label>Card Details (Typography)</label>
            <div class="style-controls" id="sc-details"></div>
          </div>

          <div class="grid grid-cols-2 gap-4">
            <div class="input-group"><label>Roll</label><input type="text" id="in-roll" value="176"></div>
            <div class="input-group"><label>Session</label><input type="text" id="in-session" value="2025-2026"></div>
          </div>

          <!-- Signature -->
          <div class="input-group">
            <label>Principal Signature</label>
            <input type="file" id="up-sign">
            <div class="style-controls" id="sc-sign"></div>
          </div>
        </div>

        <div id="form-back" class="hidden">
          <div class="input-group">
            <label>Back side Header</label>
            <input type="text" id="in-backtitle" value="Subject Code">
            <div class="style-controls" id="sc-backtitle"></div>
          </div>

          <div class="input-group">
            <label>Subject Listing</label>
            <div id="sub-container"></div>
            <button onclick="addS()"
              class="w-full py-2 bg-blue-50 text-blue-600 rounded-xl text-[10px] font-black mt-2 tracking-widest">+ ADD
              SUBJECT</button>
            <div class="style-controls" id="sc-subs"></div>
          </div>

          <div class="input-group">
            <label>Return Policy Info</label>
            <input type="text" id="in-address" value="Syamnagor, Satkhira">
            <div class="style-controls" id="sc-return"></div>
          </div>
        </div>

        <button onclick="window.print()"
          class="w-full bg-blue-600 text-white font-black py-4 rounded-xl mt-4 elevation-10">PRINT FINAL CARD</button>
      </div>
    </div>

    <div class="flex flex-col items-center sticky top-10">
      <div class="full">
        <div class="inside" id="card-body"></div>
      </div>
      <p class="text-gray-400 font-black text-[9px] mt-8 uppercase tracking-[4px] opacity-70">Interactive Preview</p>
    </div>
  </div>

  <!-- Templates -->
  <template id="t-front">
    <div class="mt-4"><img src="Screenshot_3.png" class="collage-logo-img"></div>
    <div class="c-el collage-name" id="c-collage"></div>
    <div class="img-section">
      <div class="img-text" id="c-dept"></div>
      <div class="my-img-container" id="c-img-wrap"><img src="WhatsApp Image 2024-10-18 at 22.53.53_df57dcee.jpg"
          class="my-img" id="c-photo"></div>
    </div>
    <div class="c-el my-name" id="c-name"></div>
    <div class="c-el details" id="c-details">
      <div>Roll : <span id="c-roll"></span></div>
      <div>Session : <span id="c-session"></span></div>
    </div>
    <div id="c-sign-wrap" class="sin-img-container"><img src="sing.png" class="sin-img" id="c-sign">
      <div class="principal">Principal's signature</div>
    </div>
  </template>

  <template id="t-back">
    <div class="back-card back-content">
      <div class="c-el back-title" id="c-backtitle"></div>
      <div class="c-el subjects-list" id="c-subs"></div>
      <div class="return-section" id="c-return-section">
        <div class="c-el return-title" id="c-re-title">If Found, Please Return To</div>
        <div class="c-el address-text" id="c-address"></div>
      </div>
      <div class="c-el contact-info" id="c-contacts">
        <div>Phone : <span class="phone" id="c-phone"></span></div>
      </div>
    </div>
  </template>

  <script>
    let side = 'front';
    let subs = [{ c: "211501", n: "History of Bangladesh" }, { c: "211001", n: "Culture of Bangladesh" }];
    let imgs = { photo: null, sign: null };

    const styleConfigs = {
      collage: { size: 16, weight: 800, color: '#000000', align: 'center', mt: 5, mb: 0, ml: 0, mr: 0 },
      name: { size: 16, weight: 800, color: '#000000', align: 'center', mt: 8, mb: 0, ml: 0, mr: 0 },
      details: { size: 11, weight: 700, color: '#000000', align: 'left', mt: 8, mb: 0, ml: 20, mr: 0 },
      dept: { size: 11, weight: 800, color: '#1E3A8A', align: 'center', mt: 0, mb: 0, ml: 0, mr: 0 },
      photo: { size: 180, border: 2, color: '#0000FF', radius: 0, mt: 0, mb: 0, ml: 0, mr: 0 },
      sign: { size: 25, mt: 0, mb: 15, ml: 0, mr: 0 },
      backtitle: { size: 20, weight: 800, color: '#076cf9', align: 'center', mt: 5, mb: 0, ml: 0, mr: 0 },
      subs: { size: 11, weight: 600, color: '#000000', align: 'left', mt: 15, mb: 0, ml: 0, mr: 0 },
      return: { size: 14, weight: 900, color: '#FF0000', align: 'center', mt: 0, mb: 0, ml: 0, mr: 0 }
    };

    function renderStyles() {
      Object.keys(styleConfigs).forEach(key => {
        const conf = styleConfigs[key];
        const container = document.getElementById(`sc-${key}`);
        if (!container) return;

        let html = `
                    <div class="style-item"><label>Size</label><input type="number" data-key="${key}" data-prop="size" value="${conf.size}"></div>
                `;
        if ('weight' in conf) html += `<div class="style-item"><label>Weight</label><input type="number" data-key="${key}" data-prop="weight" value="${conf.weight}" step="100"></div>`;
        if ('color' in conf) html += `<div class="style-item"><label>Color</label><input type="color" data-key="${key}" data-prop="color" value="${conf.color}"></div>`;
        if ('align' in conf) {
          const options = key === 'dept' ? ['center', 'top', 'bottom'] : ['left', 'center', 'right'];
          html += `<div class="style-item"><label>Align</label><select data-key="${key}" data-prop="align">${options.map(o => `<option value="${o}" ${conf.align === o ? 'selected' : ''}>${o.charAt(0).toUpperCase() + o.slice(1)}</option>`).join('')}</select></div>`;
        }
        if ('border' in conf) html += `<div class="style-item"><label>Border</label><input type="number" data-key="${key}" data-prop="border" value="${conf.border}"></div>`;
        if ('radius' in conf) html += `<div class="style-item"><label>Radius</label><input type="number" data-key="${key}" data-prop="radius" value="${conf.radius}"></div>`;

        // Spacing Controls
        html += `
                    <div class="style-item"><label>Top</label><input type="number" data-key="${key}" data-prop="mt" value="${conf.mt}"></div>
                    <div class="style-item"><label>Bottom</label><input type="number" data-key="${key}" data-prop="mb" value="${conf.mb}"></div>
                    <div class="style-item"><label>Left</label><input type="number" data-key="${key}" data-prop="ml" value="${conf.ml}"></div>
                    <div class="style-item"><label>Right</label><input type="number" data-key="${key}" data-prop="mr" value="${conf.mr}"></div>
                `;
        container.innerHTML = html;
      });
    }

    function switchSide(s) {
      side = s;
      document.querySelectorAll('.tab-btn').forEach((b, i) => b.classList.toggle('active', (s === 'front' ? i === 0 : i === 1)));
      document.getElementById('form-front').classList.toggle('hidden', s === 'back');
      document.getElementById('form-back').classList.toggle('hidden', s === 'front');
      if (s === 'back') rSubs();
      rCard();
    }

    function rSubs() {
      const container = document.getElementById('sub-container');
      container.innerHTML = subs.map((s, i) => `<div class="subject-row"><input type="text" value="${s.c}" oninput="uSub(${i},'c',this.value)"><input type="text" value="${s.n}" oninput="uSub(${i},'n',this.value)"><div class="remove-btn" onclick="rmSub(${i})"><i class="fas fa-times"></i></div></div>`).join('');
    }
    function addS() { subs.push({ c: "", n: "" }); rSubs(); rCard(); }
    function uSub(i, f, v) { subs[i][f] = v; rCard(); }
    function rmSub(i) { subs.splice(i, 1); rSubs(); rCard(); }

    function rCard() {
      const body = document.getElementById('card-body');
      body.innerHTML = '';
      body.appendChild(document.getElementById(`t-${side}`).content.cloneNode(true));
      side === 'front' ? uFront() : uBack();
    }

    function uFront() {
      setStyles('c-collage', 'in-collage', 'collage');
      setStyles('c-name', 'in-name', 'name');
      setStyles('c-details', null, 'details');

      const dept = document.getElementById('c-dept');
      const d = styleConfigs.dept;
      dept.textContent = val('in-dept');
      dept.style.fontSize = d.size + 'px'; dept.style.fontWeight = d.weight; dept.style.color = d.color;
      dept.style.justifyContent = d.align === 'top' ? 'flex-end' : (d.align === 'bottom' ? 'flex-start' : 'center');
      dept.style.margin = `${d.mt}px ${d.mr}px ${d.mb}px ${d.ml}px`;

      const imgWrap = document.getElementById('c-img-wrap');
      const p = styleConfigs.photo;
      imgWrap.style.width = p.size + 'px'; imgWrap.style.height = p.size + 'px';
      imgWrap.style.borderWidth = p.border + 'px'; imgWrap.style.borderColor = p.color;
      imgWrap.style.borderRadius = p.radius + 'px';
      imgWrap.style.margin = `${p.mt}px ${p.mr}px ${p.mb}px ${p.ml}px`;
      if (imgs.photo) document.getElementById('c-photo').src = imgs.photo;

      const signWrap = document.getElementById('c-sign-wrap');
      const s = styleConfigs.sign;
      const signImg = document.getElementById('c-sign');
      signImg.style.height = s.size + 'px';
      signWrap.style.margin = `${s.mt}px ${s.mr}px ${s.mb}px ${s.ml}px`;
      if (imgs.sign) signImg.src = imgs.sign;

      document.getElementById('c-roll').textContent = val('in-roll');
      document.getElementById('c-session').textContent = val('in-session');
    }

    function uBack() {
      setStyles('c-backtitle', 'in-backtitle', 'backtitle');
      setStyles('c-subs', null, 'subs');
      document.getElementById('c-subs').innerHTML = subs.map(s => `<div>${s.c} ${s.n}</div>`).join('');

      const r = styleConfigs.return;
      const reTitle = document.getElementById('c-re-title');
      reTitle.textContent = "If Found, Please Return To";
      reTitle.style.fontSize = r.size + 'px'; reTitle.style.color = r.color; reTitle.style.fontWeight = r.weight;
      reTitle.style.textAlign = r.align;
      reTitle.style.margin = `${r.mt}px ${r.mr}px ${r.mb}px ${r.ml}px`;

      const addr = document.getElementById('c-address');
      addr.textContent = val('in-address');
      addr.style.textAlign = r.align;

      document.getElementById('c-phone').textContent = val('in-phone') || '';
    }

    function val(id) { return document.getElementById(id) ? document.getElementById(id).value : ''; }

    function setStyles(targetId, inputId, configKey) {
      const el = document.getElementById(targetId);
      const conf = styleConfigs[configKey];
      if (inputId) el.textContent = val(inputId);
      el.style.fontSize = conf.size + 'px';
      if (conf.weight) el.style.fontWeight = conf.weight;
      if (conf.color) el.style.color = conf.color;
      if (conf.align) el.style.textAlign = conf.align;
      el.style.margin = `${conf.mt}px ${conf.mr}px ${conf.mb}px ${conf.ml}px`;
    }

    document.addEventListener('input', (e) => {
      if (e.target.dataset.key) {
        styleConfigs[e.target.dataset.key][e.target.dataset.prop] = e.target.type === 'number' ? parseFloat(e.target.value) : e.target.value;
        rCard();
      } else if (e.target.id.startsWith('in-')) {
        rCard();
      }
    });

    function handleFile(id, key) {
      document.getElementById(id).addEventListener('change', function () {
        if (this.files[0]) {
          const r = new FileReader();
          r.onload = (ex) => { imgs[key] = ex.target.result; rCard(); };
          r.readAsDataURL(this.files[0]);
        }
      });
    }

    handleFile('up-photo', 'photo');
    handleFile('up-sign', 'sign');
    renderStyles();
    switchSide('front');
  </script>
</body>

</html>
