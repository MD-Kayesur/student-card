<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dynamic Student Card Generator</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <style>
    body {
      background-color: #f3f4f6;
      font-family: 'Inter', sans-serif;
    }

    .container-wrapper {
      display: grid;
      grid-template-columns: 480px 1fr;
      gap: 40px;
      padding: 40px;
      max-width: 1700px;
      margin: 0 auto;
      align-items: start;
    }

    .editor-container {
      background: white;
      border-radius: 20px;
      box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1);
      overflow: hidden;
    }

    .tabs {
      display: flex;
      background: #f8fafc;
      border-bottom: 2px solid #e5e7eb;
    }

    .tab-btn {
      flex: 1;
      padding: 18px;
      font-size: 11px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: #64748b;
      transition: all 0.2s;
      cursor: pointer;
      text-align: center;
    }

    .tab-btn.active {
      color: #3b82f6;
      background: white;
      border-bottom: 3.5px solid #3b82f6;
      margin-bottom: -3.5px;
    }

    .form-content {
      padding: 30px;
      max-height: 85vh;
      overflow-y: auto;
    }

    .input-group {
      margin-bottom: 20px;
      padding: 18px;
      background: #f8fafc;
      border-radius: 14px;
      border: 1px solid #f1f5f9;
      position: relative;
    }

    .group-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
    }

    .group-label {
      font-size: 11px;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #3b82f6;
    }

    /* New Style Toggle Button */
    .style-toggle-btn {
      background: #e0f2fe;
      color: #0369a1;
      border: none;
      padding: 4px 12px;
      border-radius: 8px;
      font-size: 10px;
      font-weight: 800;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .style-toggle-btn:hover {
      background: #bae6fd;
    }

    .style-toggle-btn.active {
      background: #3b82f6;
      color: white;
    }

    .main-input {
      width: 100%;
      padding: 12px 16px;
      border: 2.5px solid #e2e8f0;
      border-radius: 12px;
      font-size: 14px;
      font-weight: 600;
      background: white;
      transition: all 0.2s;
    }

    .main-input:focus {
      outline: none;
      border-color: #3b82f6;
      box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.1);
    }

    /* Collapsible Style Panel */
    .style-panel {
      display: none;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
      margin-top: 15px;
      padding-top: 15px;
      border-top: 1px dashed #cbd5e1;
    }

    .style-panel.show {
      display: grid;
    }

    .style-item {
      display: flex;
      flex-direction: column;
    }

    .style-item label {
      font-size: 9px;
      font-weight: 800;
      color: #64748b;
      margin-bottom: 6px;
      text-transform: uppercase;
    }

    .style-item input,
    .style-item select {
      width: 100%;
      height: 38px;
      padding: 6px 12px !important;
      font-size: 12px !important;
      font-weight: 700;
      border: 2px solid #e2e8f0 !important;
      border-radius: 8px !important;
      background: white;
    }

    /* Card Styles */
    .full {
      height: 600px;
      width: 520px;
      background-color: blue;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 20px;
      padding: 20px;
    }

    .inside {
      background-color: white;
      padding: 10px;
      height: 480px;
      width: 280px;
      text-align: center;
      border-radius: 12px;
      position: relative;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    .back-card::before {
      content: "";
      position: absolute;
      inset: 0;
      background-image: url("Screenshot_3.png");
      background-repeat: no-repeat;
      background-size: cover;
      opacity: 0.2;
      z-index: 1;
    }

    .c-el {
      z-index: 2;
      position: relative;
      display: block;
      box-sizing: border-box;
    }

    .collage-logo-img {
      height: 40px;
      margin: 0 auto;
      z-index: 2;
      position: relative;
    }

    .img-section {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 220px;
      margin-top: 10px;
      padding: 0 10px;
      gap: 15px;
      z-index: 2;
      position: relative;
    }

    .img-text {
      color: blue;
      white-space: nowrap;
      writing-mode: vertical-rl;
      transform: rotate(180deg);
      height: 100%;
      display: flex;
      align-items: center;
    }

    .my-img-container {
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      border: 2px solid blue;
    }

    .my-img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .sin-img-container {
      margin-top: auto;
      padding-bottom: 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .sin-img {
      height: 25px;
      object-fit: contain;
    }

    .principal {
      margin-top: 5px;
      border-top: 1px solid #000;
      padding-top: 4px;
      width: 80%;
      display: inline-block;
      font-size: 8px;
      font-weight: 800;
    }

    .back-content {
      z-index: 2;
      position: relative;
      height: 100%;
      padding: 10px;
      display: flex;
      flex-direction: column;
    }

    .back-title::after {
      content: "";
      display: block;
      width: 50%;
      height: 2px;
      background: #02db2d;
      margin: 4px auto;
      border-radius: 10px;
    }

    .subject-row {
      display: grid;
      grid-template-columns: 80px 1fr 30px;
      gap: 8px;
      margin-bottom: 6px;
    }

    .remove-btn {
      color: #ef4444;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .hidden {
      display: none !important;
    }
  </style>
</head>

<body>
  <div class="container-wrapper">
    <div class="editor-container">
      <div class="tabs">
        <div class="tab-btn active" onclick="switchSide('front')">FRONT CONFIG</div>
        <div class="tab-btn" onclick="switchSide('back')">BACK CONFIG</div>
      </div>

      <div class="form-content">
        <div id="form-front">
          <!-- Groups with Toggle Buttons -->
          <div class="input-group" data-key="collage">
            <div class="group-header"><span class="group-label">Collage Name</span><button class="style-toggle-btn"
                onclick="toggleS('collage')"><i class="fas fa-cog"></i> STYLES</button></div>
            <input type="text" id="in-collage" value="MOHASIN COLLAGE" class="main-input">
            <div class="style-panel" id="sc-collage"></div>
          </div>

          <div class="input-group" data-key="dept">
            <div class="group-header"><span class="group-label">Sidebar Dept Title</span><button
                class="style-toggle-btn" onclick="toggleS('dept')"><i class="fas fa-cog"></i> STYLES</button></div>
            <input type="text" id="in-dept" value="BANGLA DEPARTMENT" class="main-input">
            <div class="style-panel" id="sc-dept"></div>
          </div>

          <div class="input-group" data-key="photo">
            <div class="group-header"><span class="group-label">Student Photo</span><button class="style-toggle-btn"
                onclick="toggleS('photo')"><i class="fas fa-cog"></i> STYLES</button></div>
            <input type="file" id="up-photo" class="main-input">
            <div class="style-panel" id="sc-photo"></div>
          </div>

          <div class="input-group" data-key="name">
            <div class="group-header"><span class="group-label">Student Name</span><button class="style-toggle-btn"
                onclick="toggleS('name')"><i class="fas fa-cog"></i> STYLES</button></div>
            <input type="text" id="in-name" value="MD Kayesur Rahman" class="main-input">
            <div class="style-panel" id="sc-name"></div>
          </div>

          <div class="grid grid-cols-2 gap-4">
            <div class="input-group" data-key="roll">
              <div class="group-header"><span class="group-label">Roll</span><button class="style-toggle-btn"
                  onclick="toggleS('roll')"><i class="fas fa-cog"></i></button></div>
              <input type="text" id="in-roll" value="176" class="main-input">
              <div class="style-panel" id="sc-roll"></div>
            </div>
            <div class="input-group" data-key="session">
              <div class="group-header"><span class="group-label">Session</span><button class="style-toggle-btn"
                  onclick="toggleS('session')"><i class="fas fa-cog"></i></button></div>
              <input type="text" id="in-session" value="2025-2026" class="main-input">
              <div class="style-panel" id="sc-session"></div>
            </div>
          </div>

          <div class="input-group" data-key="sign">
            <div class="group-header"><span class="group-label">Principal Signature</span><button
                class="style-toggle-btn" onclick="toggleS('sign')"><i class="fas fa-cog"></i> STYLES</button></div>
            <input type="file" id="up-sign" class="main-input">
            <div class="style-panel" id="sc-sign"></div>
          </div>
        </div>

        <div id="form-back" class="hidden">
          <div class="input-group" data-key="backtitle">
            <div class="group-header"><span class="group-label">Back Side Header</span><button class="style-toggle-btn"
                onclick="toggleS('backtitle')"><i class="fas fa-cog"></i> STYLES</button></div>
            <input type="text" id="in-backtitle" value="Subject Code" class="main-input">
            <div class="style-panel" id="sc-backtitle"></div>
          </div>

          <div class="input-group" data-key="subs">
            <div class="group-header"><span class="group-label">Subjects Details</span><button class="style-toggle-btn"
                onclick="toggleS('subs')"><i class="fas fa-cog"></i> STYLES</button></div>
            <div id="sub-container"></div>
            <button onclick="addS()"
              class="w-full py-3 bg-blue-50 text-blue-600 rounded-xl text-[11px] font-black mt-2 tracking-widest">+ ADD
              NEW SUBJECT</button>
            <div class="style-panel" id="sc-subs"></div>
          </div>

          <div class="input-group" data-key="return">
            <div class="group-header"><span class="group-label">Return Information</span><button
                class="style-toggle-btn" onclick="toggleS('return')"><i class="fas fa-cog"></i> STYLES</button></div>
            <input type="text" id="in-address" value="Syamnagor, Satkhira" class="main-input">
            <div class="style-panel" id="sc-return"></div>
          </div>

          <div class="input-group" data-key="phone">
            <div class="group-header"><span class="group-label">Emergency Contact Line</span><button
                class="style-toggle-btn" onclick="toggleS('phone')"><i class="fas fa-cog"></i> STYLES</button></div>
            <input type="text" id="in-phone" value="+8801700000000" class="main-input">
            <div class="style-panel" id="sc-phone"></div>
          </div>
        </div>

        <button onclick="window.print()"
          class="w-full bg-blue-600 text-white font-black py-5 rounded-2xl mt-4 shadow-xl active:translate-y-1 transition-all">GENERATE
          & PRINT</button>
      </div>
    </div>

    <div class="flex flex-col items-center sticky top-10">
      <div class="full">
        <div class="inside" id="card-body"></div>
      </div>
      <p class="text-gray-400 font-bold text-xs mt-10 uppercase tracking-widest opacity-70">LIVE PREVIEW</p>
    </div>
  </div>

  <template id="t-front">
    <div class="mt-4"><img src="Screenshot_3.png" class="collage-logo-img"></div>
    <div class="c-el collage-name" id="c-collage"></div>
    <div class="img-section">
      <div class="img-text" id="c-dept"></div>
      <div class="my-img-container" id="c-img-wrap"><img src="WhatsApp Image 2024-10-18 at 22.53.53_df57dcee.jpg"
          class="my-img" id="c-photo"></div>
    </div>
    <div class="c-el my-name" id="c-name"></div>
    <div class="c-el" id="c-roll-line">Roll : <span id="c-roll"></span></div>
    <div class="c-el" id="c-session-line">Session : <span id="c-session"></span></div>
    <div id="c-sign-wrap" class="sin-img-container"><img src="sing.png" class="sin-img" id="c-sign">
      <div class="principal">Principal's signature</div>
    </div>
  </template>

  <template id="t-back">
    <div class="back-card back-content">
      <div class="c-el back-title" id="c-backtitle"></div>
      <div class="c-el subjects-list" id="c-subs"></div>
      <div class="return-section" id="c-return-section">
        <div class="c-el return-title" id="c-re-title">If Found, Please Return To</div>
        <div class="c-el address-text" id="c-address"></div>
      </div>
      <div class="c-el contact-info" id="c-contacts">
        <div>Phone : <span id="cc-phone"></span></div>
      </div>
    </div>
  </template>

  <script>
    let side = 'front';
    let subs = [{ c: "211501", n: "History of Bangladesh" }, { c: "211001", n: "Culture of Bangladesh" }];
    let imgs = { photo: null, sign: null };

    const ds = { size: 14, weight: 600, color: '#000000', align: 'center', mt: 0, mb: 0, ml: 0, mr: 0, w: 0, h: 0 };
    const sc = {
      collage: { ...ds, size: 16, weight: 800, mt: 5 },
      name: { ...ds, size: 16, weight: 800, mt: 8 },
      roll: { ...ds, size: 11, align: 'left', ml: 20, mt: 8 },
      session: { ...ds, size: 11, align: 'left', ml: 20 },
      dept: { ...ds, size: 11, weight: 800, color: '#1E3A8A' },
      photo: { ...ds, size: 180, border: 2, color: '#0000FF', radius: 0 },
      sign: { ...ds, size: 25, mb: 20 },
      backtitle: { ...ds, size: 20, weight: 800, color: '#076cf9', mt: 5 },
      subs: { ...ds, size: 11, align: 'left', mt: 15, ml: 15, weight: 800 },
      return: { ...ds, size: 14, weight: 900, color: '#FF0000' },
      phone: { ...ds, size: 12, mt: 10, align: 'left', ml: 10, weight: 800 }
    };

    function toggleS(key) {
      const panel = document.getElementById(`sc-${key}`);
      const btn = panel.previousElementSibling.previousElementSibling.querySelector('.style-toggle-btn') || panel.parentElement.querySelector('.style-toggle-btn');
      const isHidden = panel.style.display === 'none' || panel.style.display === '';
      panel.style.display = isHidden ? 'grid' : 'none';
      btn.classList.toggle('active', isHidden);
      btn.innerHTML = isHidden ? '<i class="fas fa-times"></i> HIDE' : '<i class="fas fa-cog"></i> STYLES';
    }

    function renderStyles() {
      Object.keys(sc).forEach(key => {
        const conf = sc[key];
        const container = document.getElementById(`sc-${key}`);
        if (!container) return;

        let html = `
                    <div class="style-item"><label>Size</label><input type="number" data-key="${key}" data-prop="size" value="${conf.size}"></div>
                    <div class="style-item"><label>Weight</label><input type="number" data-key="${key}" data-prop="weight" value="${conf.weight || 600}"></div>
                    <div class="style-item"><label>Color</label><input type="color" data-key="${key}" data-prop="color" value="${conf.color || '#000000'}"></div>
                    <div class="style-item"><label>Align</label><select data-key="${key}" data-prop="align">
                        ${(key === 'dept' ? ['center', 'top', 'bottom'] : ['left', 'center', 'right']).map(o => `<option value="${o}" ${conf.align === o ? 'selected' : ''}>${o.toUpperCase()}</option>`).join('')}
                    </select></div>
                    <div class="style-item"><label>Width</label><input type="number" data-key="${key}" data-prop="w" value="${conf.w}"></div>
                    <div class="style-item"><label>Height</label><input type="number" data-key="${key}" data-prop="h" value="${conf.h}"></div>
                    <div class="style-item"><label>Top Margin</label><input type="number" data-key="${key}" data-prop="mt" value="${conf.mt}"></div>
                    <div class="style-item"><label>Bottom Margin</label><input type="number" data-key="${key}" data-prop="mb" value="${conf.mb}"></div>
                    <div class="style-item"><label>Left Margin</label><input type="number" data-key="${key}" data-prop="ml" value="${conf.ml}"></div>
                    <div class="style-item"><label>Right Margin</label><input type="number" data-key="${key}" data-prop="mr" value="${conf.mr}"></div>
                `;
        if (key === 'photo') {
          html += `
                        <div class="style-item"><label>Border Px</label><input type="number" data-key="${key}" data-prop="border" value="${conf.border}"></div>
                        <div class="style-item"><label>Radius Px</label><input type="number" data-key="${key}" data-prop="radius" value="${conf.radius}"></div>
                    `;
        }
        container.innerHTML = html;
      });
    }

    function switchSide(s) {
      side = s;
      document.querySelectorAll('.tab-btn').forEach((b, i) => b.classList.toggle('active', (s === 'front' ? i === 0 : i === 1)));
      document.getElementById('form-front').classList.toggle('hidden', s === 'back');
      document.getElementById('form-back').classList.toggle('hidden', s === 'front');
      if (s === 'back') rSubs();
      rCard();
    }

    function rSubs() {
      const container = document.getElementById('sub-container');
      container.innerHTML = subs.map((s, i) => `<div class="subject-row"><input type="text" value="${s.c}" oninput="uSub(${i},'c',this.value)"><input type="text" value="${s.n}" oninput="uSub(${i},'n',this.value)"><div class="remove-btn" onclick="rmSub(${i})"><i class="fas fa-times"></i></div></div>`).join('');
    }
    function addS() { subs.push({ c: "", n: "" }); rSubs(); rCard(); }
    function uSub(i, f, v) { subs[i][f] = v; rCard(); }
    function rmSub(i) { subs.splice(i, 1); rSubs(); rCard(); }

    function rCard() {
      const body = document.getElementById('card-body');
      body.innerHTML = '';
      body.appendChild(document.getElementById(`t-${side}`).content.cloneNode(true));
      side === 'front' ? uFront() : uBack();
    }

    function uFront() {
      setStyles('c-collage', 'in-collage', 'collage');
      setStyles('c-name', 'in-name', 'name');
      setStyles('c-roll-line', null, 'roll');
      document.getElementById('c-roll').textContent = val('in-roll');
      setStyles('c-session-line', null, 'session');
      document.getElementById('c-session').textContent = val('in-session');

      const dept = document.getElementById('c-dept');
      const d = sc.dept;
      dept.textContent = val('in-dept');
      dept.style.fontSize = d.size + 'px'; dept.style.fontWeight = d.weight; dept.style.color = d.color;
      dept.style.justifyContent = d.align === 'top' ? 'flex-end' : (d.align === 'bottom' ? 'flex-start' : 'center');
      dept.style.margin = `${d.mt}px ${d.mr}px ${d.mb}px ${d.ml}px`;
      if (d.w) dept.style.width = d.w + 'px';
      if (d.h) dept.style.height = d.h + 'px';

      const imgWrap = document.getElementById('c-img-wrap');
      const p = sc.photo;
      imgWrap.style.width = (p.w || p.size) + 'px'; imgWrap.style.height = (p.h || p.size) + 'px';
      imgWrap.style.borderWidth = p.border + 'px'; imgWrap.style.borderColor = p.color;
      imgWrap.style.borderRadius = p.radius + 'px';
      imgWrap.style.margin = `${p.mt}px ${p.mr}px ${p.mb}px ${p.ml}px`;
      if (imgs.photo) document.getElementById('c-photo').src = imgs.photo;

      const signWrap = document.getElementById('c-sign-wrap');
      const s = sc.sign;
      const signImg = document.getElementById('c-sign');
      signImg.style.height = (s.h || s.size) + 'px';
      if (s.w) signImg.style.width = s.w + 'px';
      signWrap.style.margin = `${s.mt}px ${s.mr}px ${s.mb}px ${s.ml}px`;
      if (imgs.sign) signImg.src = imgs.sign;
    }

    function uBack() {
      setStyles('c-backtitle', 'in-backtitle', 'backtitle');
      setStyles('c-subs', null, 'subs');
      document.getElementById('c-subs').innerHTML = subs.map(s => `<div style="font-weight:${sc.subs.weight}">${s.c} ${s.n}</div>`).join('');

      setStyles('c-re-title', null, 'return');
      setStyles('c-address', 'in-address', 'return');

      setStyles('c-contacts', 'in-phone', 'phone');
      document.getElementById('cc-phone').textContent = val('in-phone');
    }

    function val(id) { return document.getElementById(id) ? document.getElementById(id).value : ''; }
    function setStyles(targetId, inputId, configKey) {
      const el = document.getElementById(targetId);
      const conf = sc[configKey];
      if (inputId) el.textContent = val(inputId);
      el.style.fontSize = conf.size + 'px';
      el.style.fontWeight = conf.weight;
      el.style.color = conf.color;
      el.style.textAlign = conf.align;
      el.style.margin = `${conf.mt}px ${conf.mr}px ${conf.mb}px ${conf.ml}px`;
      if (conf.w) el.style.width = conf.w + 'px';
      if (conf.h) el.style.height = conf.h + 'px';
    }

    document.addEventListener('input', (e) => {
      const k = e.target.dataset.key;
      if (k) {
        sc[k][e.target.dataset.prop] = e.target.type === 'number' ? parseFloat(e.target.value) : e.target.value;
        rCard();
      } else if (e.target.id.startsWith('in-')) {
        rCard();
      }
    });

    function handleFile(id, key) {
      document.getElementById(id).addEventListener('change', function () {
        if (this.files[0]) {
          const reader = new FileReader();
          reader.onload = (ex) => { imgs[key] = ex.target.result; rCard(); };
          reader.readAsDataURL(this.files[0]);
        }
      });
    }

    handleFile('up-photo', 'photo');
    handleFile('up-sign', 'sign');
    renderStyles();
    switchSide('front');
  </script>
</body>

</html>
