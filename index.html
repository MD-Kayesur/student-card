<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dynamic Student Card Generator</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <style>
    body {
      background-color: #f3f4f6;
      font-family: 'Inter', sans-serif;
    }

    .container-wrapper {
      display: grid;
      grid-template-columns: 400px 1fr;
      gap: 40px;
      padding: 40px;
      max-width: 1400px;
      margin: 0 auto;
      align-items: start;
    }

    .editor-container {
      background: white;
      border-radius: 20px;
      box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1);
      overflow: hidden;
    }

    .tabs {
      display: flex;
      background: #f8fafc;
      border-bottom: 2px solid #e5e7eb;
    }

    .tab-btn {
      flex: 1;
      padding: 18px;
      font-size: 11px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: #64748b;
      transition: all 0.2s;
      cursor: pointer;
      text-align: center;
    }

    .tab-btn.active {
      color: #3b82f6;
      background: white;
      border-bottom: 3px solid #3b82f6;
      margin-bottom: -2px;
    }

    .form-content {
      padding: 30px;
    }

    .input-group {
      margin-bottom: 20px;
    }

    .input-group label {
      display: block;
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #64748b;
      margin-bottom: 6px;
    }

    .input-group input,
    .input-group select,
    .input-group textarea {
      width: 100%;
      padding: 10px 14px;
      border: 2px solid #e2e8f0;
      border-radius: 12px;
      font-size: 13px;
      transition: border-color 0.2s;
      background-color: #f8fafc;
    }

    .input-group input:focus {
      outline: none;
      border-color: #3b82f6;
    }

    /* Card Styles */
    .full {
      height: 600px;
      width: 500px;
      background-color: blue;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 20px;
      padding: 20px;
    }

    .inside {
      background-color: white;
      padding: 10px;
      height: 480px;
      width: 280px;
      text-align: center;
      border-radius: 12px;
      position: relative;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    .back-card::before {
      content: "";
      position: absolute;
      inset: 0;
      background-image: url("Screenshot_3.png");
      background-repeat: no-repeat;
      background-size: cover;
      opacity: 0.2;
      z-index: 1;
    }

    .collage-logo-img {
      height: 40px;
      margin: 0 auto;
      z-index: 2;
      position: relative;
    }

    .collage-name {
      font-size: 16px;
      font-weight: 800;
      margin-top: 5px;
      color: #000;
      z-index: 2;
      position: relative;
    }

    .img-section {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 220px;
      margin-top: 15px;
      padding: 0 10px;
      gap: 15px;
      z-index: 2;
      position: relative;
    }

    .img-text {
      color: blue;
      font-weight: 800;
      font-size: 11px;
      white-space: nowrap;
      writing-mode: vertical-rl;
      transform: rotate(180deg);
      text-align: center;
      height: 100%;
    }

    .my-img-container {
      width: 180px;
      height: 180px;
      border: 2px solid blue;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      background-color: #f8fafc;
    }

    .my-img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .my-name {
      font-weight: 800;
      font-size: 16px;
      margin-top: 10px;
      color: #000;
      z-index: 2;
      position: relative;
    }

    .details {
      font-weight: 600;
      text-align: left;
      margin-left: 20px;
      margin-top: 10px;
      font-size: 11px;
      line-height: 1.6;
      z-index: 2;
      position: relative;
    }

    .sin-img-container {
      margin-top: auto;
      padding-bottom: 20px;
      z-index: 2;
      position: relative;
    }

    .sin-img {
      height: 25px;
      margin: 0 auto;
    }

    .principal {
      font-weight: 800;
      font-size: 10px;
      margin-top: 5px;
      border-top: 1px solid #000;
      display: inline-block;
      padding-top: 5px;
      width: 80%;
    }

    .back-content {
      z-index: 2;
      position: relative;
      height: 100%;
      padding: 10px;
      display: flex;
      flex-direction: column;
    }

    .back-title {
      font-weight: 800;
      font-size: 20px;
      color: #076cf9;
      margin-top: 10px;
    }

    .back-title::after {
      content: "";
      display: block;
      width: 140px;
      height: 3px;
      background: #02db2d;
      margin: 4px auto;
      border-radius: 10px;
    }

    .subjects-list {
      text-align: left;
      font-size: 11px;
      font-weight: 600;
      margin-top: 20px;
      padding: 0 10px;
      line-height: 1.8;
    }

    .return-section {
      margin-top: auto;
      border-top: 1.5px solid #000;
      padding-top: 8px;
      margin-bottom: 10px;
    }

    .return-title {
      color: red;
      font-weight: 900;
      font-size: 14px;
      margin-bottom: 4px;
    }

    .address-text {
      font-weight: 700;
      font-size: 10px;
    }

    .contact-info {
      font-size: 9px;
      font-weight: 700;
      margin-top: 15px;
      line-height: 1.6;
    }

    .contact-info span.phone {
      color: red;
    }

    .subject-row {
      display: grid;
      grid-template-columns: 80px 1fr 30px;
      gap: 8px;
      margin-bottom: 8px;
    }

    .subject-row input {
      padding: 6px 10px;
      font-size: 12px;
      border-radius: 8px;
    }

    .remove-btn {
      color: #ef4444;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .hidden {
      display: none !important;
    }
  </style>
</head>

<body>
  <div class="container-wrapper">
    <div class="editor-container">
      <div class="tabs">
        <div class="tab-btn active" id="tab-front" onclick="switchSide('front')">FRONT SIDE</div>
        <div class="tab-btn" id="tab-back" onclick="switchSide('back')">BACK SIDE</div>
      </div>

      <div class="form-content">
        <div id="form-front">
          <div class="input-group"><label>Collage Name</label><input type="text" id="input-collage"
              value="MOHASIN COLLAGE"></div>
          <div class="input-group"><label>Department / Subject</label><input type="text" id="input-dept"
              value="BANGLA DEPARTMENT"></div>
          <div class="input-group"><label>Student Photo</label><input type="file" id="input-photo"></div>
          <div class="input-group"><label>Student Name</label><input type="text" id="input-name"
              value="MD Kayesur Rahman"></div>
          <div class="grid grid-cols-2 gap-4">
            <div class="input-group"><label>Roll</label><input type="text" id="input-roll" value="176"></div>
            <div class="input-group"><label>Session</label><input type="text" id="input-session" value="2025-2026">
            </div>
          </div>
          <div class="grid grid-cols-2 gap-4">
            <div class="input-group"><label>Level</label><input type="text" id="input-level" value="Honours"></div>
            <div class="input-group"><label>Blood Group</label><select id="input-blood">
                <option value="B+">B+</option>
                <option value="A+">A+</option>
              </select></div>
          </div>
          <div class="input-group"><label>Validity</label><input type="text" id="input-valid" value="2028"></div>
          <div class="input-group"><label>Signature</label><input type="file" id="input-sign"></div>
        </div>

        <div id="form-back" class="hidden">
          <div class="input-group">
            <label>Subject List</label>
            <div id="subject-inputs-container">
              <!-- Dynamic subject rows here -->
            </div>
            <button onclick="addSubjectRow()"
              class="w-full py-2 bg-blue-50 text-blue-600 border border-blue-200 rounded-xl text-[10px] font-black uppercase tracking-widest mt-2 hover:bg-blue-100 transition-all">
              + Add New Subject
            </button>
          </div>
          <div class="input-group"><label>Return Address</label><input type="text" id="input-address"
              value="Syamnagor, Satkhira"></div>
          <div class="input-group"><label>Phone Number</label><input type="text" id="input-phone"
              value="+88 01926-360430"></div>
          <div class="input-group"><label>Portal / Email</label><input type="text" id="input-email"
              value="mohasincollage@gmail.com"></div>
          <div class="input-group"><label>Website</label><input type="text" id="input-web"
              value="www.mohasin collage.edu.bd"></div>
        </div>

        <button onclick="window.print()"
          class="w-full bg-blue-600 text-white font-black py-4 rounded-xl mt-4 hover:bg-blue-700 shadow-lg">PRINT
          SIDE</button>
      </div>
    </div>

    <div class="flex flex-col items-center">
      <div class="full">
        <div class="inside" id="card-body"></div>
      </div>
      <p class="text-gray-400 font-bold text-xs mt-8 uppercase tracking-widest">Live <span id="label-side">Front</span>
        Preview</p>
    </div>
  </div>

  <template id="tpl-front">
    <div class="mt-4"><img src="Screenshot_3.png" class="collage-logo-img"></div>
    <div class="collage-name">
      <h1 id="card-collage"></h1>
    </div>
    <div class="img-section">
      <div class="img-text" id="card-dept"></div>
      <div class="my-img-container"><img src="WhatsApp Image 2024-10-18 at 22.53.53_df57dcee.jpg" class="my-img"
          id="card-photo"></div>
    </div>
    <div class="my-name">
      <h1 id="card-name"></h1>
    </div>
    <div class="details">
      <h4>Class Roll <span id="card-roll"></span></h4>
      <h4>Session <span id="card-session"></span></h4>
      <h4>Study Level <span id="card-level"></span></h4>
      <h4>Blood Group <span id="card-blood"></span></h4>
      <h4>Validity <span id="card-valid"></span></h4>
    </div>
    <div class="sin-img-container"><img src="sing.png" class="sin-img" id="card-sign">
      <div class="principal">Principal's signature</div>
    </div>
  </template>

  <template id="tpl-back">
    <div class="back-card back-content">
      <div class="back-title">Subject Code</div>
      <div class="subjects-list" id="card-subjects"></div>
      <div class="return-section">
        <div class="return-title">If Found, Please Return To</div>
        <div class="address-text" id="card-address"></div>
      </div>
      <div class="contact-info">
        <div>Phone <span class="phone" id="card-phone"></span></div>
        <div id="card-email"></div>
        <div id="card-web"></div>
      </div>
    </div>
  </template>

  <script>
    let currentSide = 'front';
    let photos = { front: null, sign: null };
    let subjects = [
      { code: "211501", name: "History of Bangladesh" },
      { code: "211001", name: "Culture of Bangladesh" },
      { code: "211003", name: "Language of Bangladesh" }
    ];

    function switchSide(side) {
      currentSide = side;
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.id === `tab-${side}`));
      document.getElementById('form-front').classList.toggle('hidden', side === 'back');
      document.getElementById('form-back').classList.toggle('hidden', side === 'front');
      document.getElementById('label-side').textContent = side.charAt(0).toUpperCase() + side.slice(1);
      if (side === 'back') renderSubjectInputs();
      renderCard();
    }

    function renderSubjectInputs() {
      const container = document.getElementById('subject-inputs-container');
      container.innerHTML = subjects.map((s, i) => `
                <div class="subject-row">
                    <input type="text" value="${s.code}" oninput="updateSubject(${i}, 'code', this.value)" placeholder="Code">
                    <input type="text" value="${s.name}" oninput="updateSubject(${i}, 'name', this.value)" placeholder="Name">
                    <div class="remove-btn" onclick="removeSubject(${i})"><i class="fas fa-times"></i></div>
                </div>
            `).join('');
    }

    function addSubjectRow() {
      subjects.push({ code: "", name: "" });
      renderSubjectInputs();
      renderCard();
    }

    function updateSubject(i, field, val) {
      subjects[i][field] = val;
      renderCard();
    }

    function removeSubject(i) {
      subjects.splice(i, 1);
      renderSubjectInputs();
      renderCard();
    }

    function renderCard() {
      const container = document.getElementById('card-body');
      container.innerHTML = '';
      container.appendChild(document.getElementById(`tpl-${currentSide}`).content.cloneNode(true));
      currentSide === 'front' ? updateFront() : updateBack();
    }

    function updateFront() {
      setT('card-collage', getV('input-collage'));
      setT('card-dept', getV('input-dept'));
      setT('card-name', getV('input-name'));
      setT('card-roll', ': ' + getV('input-roll'), 'margin-left: 20px');
      setT('card-session', ': ' + getV('input-session'), 'margin-left: 33px');
      setT('card-level', ': ' + getV('input-level'), 'margin-left: 17px');
      setT('card-blood', ': ' + getV('input-blood'), 'margin-left: 14px');
      setT('card-valid', ': ' + getV('input-valid'), 'margin-left: 41px');
      if (photos.front) document.getElementById('card-photo').src = photos.front;
      if (photos.sign) document.getElementById('card-sign').src = photos.sign;
    }

    function updateBack() {
      document.getElementById('card-subjects').innerHTML = subjects.map(s => `<div>${s.code} ${s.name}</div>`).join('');
      setT('card-address', getV('input-address'));
      setT('card-phone', ': ' + getV('input-phone'));
      setT('card-email', getV('input-email'));
      setT('card-web', getV('input-web'));
    }

    function getV(id) { return document.getElementById(id).value; }
    function setT(id, val, style) {
      const el = document.getElementById(id);
      el.textContent = val;
      if (style) el.style = style;
    }

    document.addEventListener('input', (e) => {
      if (e.target.id.startsWith('input-')) renderCard();
    });

    function handleImg(inputId, key) {
      document.getElementById(inputId).addEventListener('change', function (e) {
        if (this.files && this.files[0]) {
          const reader = new FileReader();
          reader.onload = (ex) => { photos[key] = ex.target.result; renderCard(); };
          reader.readAsDataURL(this.files[0]);
        }
      });
    }

    handleImg('input-photo', 'front');
    handleImg('input-sign', 'sign');
    switchSide('front');
  </script>
</body>

</html>
