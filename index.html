<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dynamic Student Card Generator</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <style>
    body {
      background-color: #f3f4f6;
      font-family: 'Inter', sans-serif;
    }

    .container-wrapper {
      display: grid;
      grid-template-columns: 480px 1fr;
      gap: 40px;
      padding: 40px;
      max-width: 1700px;
      margin: 0 auto;
      align-items: start;
    }

    .editor-container {
      background: white;
      border-radius: 20px;
      box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1);
      overflow: hidden;
    }

    .tabs {
      display: flex;
      background: #f8fafc;
      border-bottom: 2px solid #e5e7eb;
    }

    .tab-btn {
      flex: 1;
      padding: 18px;
      font-size: 11px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: #64748b;
      transition: all 0.2s;
      cursor: pointer;
      text-align: center;
    }

    .tab-btn.active {
      color: #3b82f6;
      background: white;
      border-bottom: 3px solid #3b82f6;
      margin-bottom: -2px;
    }

    .form-content {
      padding: 30px;
      max-height: 85vh;
      overflow-y: auto;
    }

    .input-group {
      margin-bottom: 24px;
      padding: 15px;
      background: #f8fafc;
      border-radius: 12px;
      border: 1px solid #f1f5f9;
    }

    .input-group label {
      display: block;
      font-size: 10px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: #3b82f6;
      margin-bottom: 10px;
    }

    .input-group input,
    .input-group select {
      width: 100%;
      padding: 10px 14px;
      border: 2px solid #e2e8f0;
      border-radius: 10px;
      font-size: 13px;
      transition: border-color 0.2s;
      background: white;
    }

    .style-controls {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
      margin-top: 15px;
      padding-top: 15px;
      border-top: 1px dashed #e2e8f0;
    }

    .style-item {
      display: flex;
      flex-direction: column;
    }

    .style-item label {
      font-size: 8px;
      font-weight: 800;
      color: #94a3b8;
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .style-item input,
    .style-item select {
      padding: 6px 10px !important;
      font-size: 11px !important;
      border-radius: 8px !important;
      border-width: 1.5px !important;
    }

    /* Card Styles */
    .full {
      height: 600px;
      width: 500px;
      background-color: blue;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 20px;
      padding: 20px;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.15);
    }

    .inside {
      background-color: white;
      padding: 10px;
      height: 480px;
      width: 280px;
      text-align: center;
      border-radius: 12px;
      position: relative;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    .back-card::before {
      content: "";
      position: absolute;
      inset: 0;
      background-image: url("Screenshot_3.png");
      background-repeat: no-repeat;
      background-size: cover;
      opacity: 0.2;
      z-index: 1;
    }

    .collage-logo-img {
      height: 40px;
      margin: 0 auto;
      z-index: 2;
      position: relative;
    }

    .collage-name {
      margin-top: 5px;
      color: #000;
      z-index: 2;
      position: relative;
      padding: 0 10px;
      display: block;
    }

    .img-section {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 220px;
      margin-top: 15px;
      padding: 0 10px;
      gap: 15px;
      z-index: 2;
      position: relative;
    }

    .img-text {
      color: blue;
      white-space: nowrap;
      writing-mode: vertical-rl;
      transform: rotate(180deg);
      height: 100%;
      display: flex;
      align-items: center;
    }

    .my-img-container {
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      background-color: #f8fafc;
    }

    .my-img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .my-name {
      margin-top: 10px;
      color: #000;
      z-index: 2;
      position: relative;
      padding: 0 10px;
      display: block;
    }

    .details {
      text-align: left;
      margin-left: 20px;
      margin-top: 10px;
      line-height: 1.6;
      z-index: 2;
      position: relative;
      padding-right: 15px;
      display: block;
    }

    .sin-img-container {
      margin-top: auto;
      padding-bottom: 20px;
      z-index: 2;
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .sin-img {
      height: 25px;
      object-fit: contain;
    }

    .principal {
      margin-top: 5px;
      border-top: 1px solid #000;
      padding-top: 5px;
      width: 80%;
      display: inline-block;
    }

    .back-content {
      z-index: 2;
      position: relative;
      height: 100%;
      padding: 10px;
      display: flex;
      flex-direction: column;
    }

    .back-title {
      color: #076cf9;
      margin-top: 8px;
      padding: 0 10px;
      display: block;
    }

    .back-title::after {
      content: "";
      display: block;
      width: 60%;
      height: 2px;
      background: #02db2d;
      margin: 4px auto;
      border-radius: 10px;
    }

    .subjects-list {
      text-align: left;
      margin-top: 15px;
      padding: 0 15px;
      line-height: 1.8;
      display: block;
    }

    .return-section {
      margin-top: auto;
      border-top: 1.5px solid #000;
      padding-top: 8px;
      margin-bottom: 8px;
      padding-left: 10px;
      padding-right: 10px;
      display: block;
    }

    .return-title {
      font-weight: 900;
      margin-bottom: 4px;
      display: block;
    }

    .address-text {
      font-weight: 700;
      display: block;
    }

    .contact-info {
      margin-top: 12px;
      line-height: 1.6;
      padding: 0 10px;
      display: block;
    }

    .subject-row {
      display: grid;
      grid-template-columns: 80px 1fr 30px;
      gap: 8px;
      margin-bottom: 8px;
    }

    .remove-btn {
      color: #ef4444;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .hidden {
      display: none !important;
    }
  </style>
</head>

<body>
  <div class="container-wrapper">
    <div class="editor-container">
      <div class="tabs">
        <div class="tab-btn active" onclick="switchSide('front')">FRONT SIDE</div>
        <div class="tab-btn" onclick="switchSide('back')">BACK SIDE</div>
      </div>

      <div class="form-content">
        <div id="form-front">
          <!-- Collage Name -->
          <div class="input-group">
            <label>Collage Name</label>
            <input type="text" id="in-collage" value="MOHASIN COLLAGE">
            <div class="style-controls">
              <div class="style-item"><label>Size</label><input type="number" id="st-collage-size" value="16"></div>
              <div class="style-item"><label>Weight</label><input type="number" id="st-collage-weight" value="800">
              </div>
              <div class="style-item"><label>Color</label><input type="color" id="st-collage-color" value="#000000">
              </div>
              <div class="style-item"><label>Align</label><select id="st-collage-align">
                  <option value="center">Center</option>
                  <option value="left">Left</option>
                  <option value="right">Right</option>
                </select></div>
            </div>
          </div>

          <!-- Dept -->
          <div class="input-group">
            <label>Dept Name (Vertical)</label>
            <input type="text" id="in-dept" value="BANGLA DEPARTMENT">
            <div class="style-controls">
              <div class="style-item"><label>Size</label><input type="number" id="st-dept-size" value="11"></div>
              <div class="style-item"><label>Weight</label><input type="number" id="st-dept-weight" value="800"></div>
              <div class="style-item"><label>Color</label><input type="color" id="st-dept-color" value="#1E3A8A"></div>
              <div class="style-item"><label>Vertical Align</label><select id="st-dept-align">
                  <option value="center">Center</option>
                  <option value="top">Top</option>
                  <option value="bottom">Bottom</option>
                </select></div>
            </div>
          </div>

          <!-- Student Image -->
          <div class="input-group">
            <label>Student Photo</label>
            <input type="file" id="up-photo">
            <div class="style-controls">
              <div class="style-item"><label>Dimension (px)</label><input type="number" id="st-photo-size" value="180">
              </div>
              <div class="style-item"><label>Border (px)</label><input type="number" id="st-photo-border" value="2">
              </div>
              <div class="style-item"><label>Border Color</label><input type="color" id="st-photo-color"
                  value="#0000FF"></div>
              <div class="style-item"><label>Radius (px)</label><input type="number" id="st-photo-radius" value="0">
              </div>
            </div>
          </div>

          <!-- Student Name -->
          <div class="input-group">
            <label>Student Name</label>
            <input type="text" id="in-name" value="MD Kayesur Rahman">
            <div class="style-controls">
              <div class="style-item"><label>Size</label><input type="number" id="st-name-size" value="16"></div>
              <div class="style-item"><label>Weight</label><input type="number" id="st-name-weight" value="800"></div>
              <div class="style-item"><label>Color</label><input type="color" id="st-name-color" value="#000000"></div>
              <div class="style-item"><label>Align</label><select id="st-name-align">
                  <option value="center">Center</option>
                  <option value="left">Left</option>
                  <option value="right">Right</option>
                </select></div>
            </div>
          </div>

          <!-- Signature Style -->
          <div class="input-group">
            <label>Signature File</label>
            <input type="file" id="up-sign">
            <div class="style-controls">
              <div class="style-item"><label>Height (px)</label><input type="number" id="st-sign-size" value="25"></div>
              <div class="style-item"><label>Top Margin</label><input type="number" id="st-sign-margin" value="0"></div>
            </div>
          </div>

          <div class="grid grid-cols-2 gap-4">
            <div class="input-group"><label>Roll</label><input type="text" id="in-roll" value="176"></div>
            <div class="input-group"><label>Session</label><input type="text" id="in-session" value="2025-2026"></div>
          </div>
        </div>

        <div id="form-back" class="hidden">
          <div class="input-group">
            <label>Back side Title</label>
            <input type="text" id="in-backtitle" value="Subject Code">
            <div class="style-controls">
              <div class="style-item"><label>Size</label><input type="number" id="st-backtitle-size" value="20"></div>
              <div class="style-item"><label>Align</label><select id="st-backtitle-align">
                  <option value="center">Center</option>
                  <option value="left">Left</option>
                  <option value="right">Right</option>
                </select></div>
            </div>
          </div>

          <div class="input-group">
            <label>Subjects Details</label>
            <div id="sub-container"></div>
            <button onclick="addS()"
              class="w-full py-2 bg-blue-50 text-blue-600 rounded-xl text-[10px] font-black mt-2 tracking-widest">+ Add
              Subject Row</button>
          </div>

          <div class="input-group">
            <label>Return Info Section</label>
            <input type="text" id="in-address" value="Syamnagor, Satkhira">
            <div class="style-controls">
              <div class="style-item"><label>Text Size</label><input type="number" id="st-return-size" value="14"></div>
              <div class="style-item"><label>Text Color</label><input type="color" id="st-return-color" value="#FF0000">
              </div>
              <div class="style-item"><label>Text Align</label><select id="st-return-align">
                  <option value="center">Center</option>
                  <option value="left">Left</option>
                  <option value="right">Right</option>
                </select></div>
            </div>
          </div>
        </div>

        <button onclick="window.print()"
          class="w-full bg-blue-600 text-white font-black py-5 rounded-2xl mt-4 shadow-[0_10px_20px_-5px_rgba(37,99,235,0.4)]">GENERATE
          & PRINT</button>
      </div>
    </div>

    <div class="flex flex-col items-center sticky top-10">
      <div class="full">
        <div class="inside" id="card-body"></div>
      </div>
      <p class="text-gray-400 font-black text-[10px] mt-8 uppercase tracking-[3px] opacity-70">Interactive Preview
        Engine</p>
    </div>
  </div>

  <template id="t-front">
    <div class="mt-4"><img src="Screenshot_3.png" class="collage-logo-img"></div>
    <div class="collage-name" id="c-collage"></div>
    <div class="img-section">
      <div class="img-text" id="c-dept"></div>
      <div class="my-img-container" id="c-img-wrap"><img src="WhatsApp Image 2024-10-18 at 22.53.53_df57dcee.jpg"
          class="my-img" id="c-photo"></div>
    </div>
    <div class="my-name" id="c-name"></div>
    <div class="details" id="c-details">
      <div>Roll : <span id="c-roll"></span></div>
      <div>Session : <span id="c-session"></span></div>
    </div>
    <div class="sin-img-container"><img src="sing.png" class="sin-img" id="c-sign">
      <div class="principal">Principal's signature</div>
    </div>
  </template>

  <template id="t-back">
    <div class="back-card back-content">
      <div class="back-title" id="c-backtitle"></div>
      <div class="subjects-list" id="c-subs"></div>
      <div class="return-section" id="c-re-section">
        <div class="return-title" id="c-re-title">If Found, Please Return To</div>
        <div class="address-text" id="c-address"></div>
      </div>
      <div class="contact-info" id="c-contacts">
        <div>Phone : <span class="phone" id="c-phone"></span></div>
      </div>
    </div>
  </template>

  <script>
    let side = 'front';
    let subs = [{ c: "211501", n: "History of Bangladesh" }, { c: "211001", n: "Culture of Bangladesh" }];
    let imgs = { photo: null, sign: null };

    function switchSide(s) {
      side = s;
      document.querySelectorAll('.tab-btn').forEach((b, i) => b.classList.toggle('active', (s === 'front' ? i === 0 : i === 1)));
      document.getElementById('form-front').classList.toggle('hidden', s === 'back');
      document.getElementById('form-back').classList.toggle('hidden', s === 'front');
      if (s === 'back') rSubs();
      rCard();
    }

    function rSubs() {
      const container = document.getElementById('sub-container');
      container.innerHTML = subs.map((s, i) => `
                <div class="subject-row">
                    <input type="text" value="${s.c}" oninput="uSub(${i},'c',this.value)" placeholder="Code">
                    <input type="text" value="${s.n}" oninput="uSub(${i},'n',this.value)" placeholder="Subject Name">
                    <div class="remove-btn" onclick="rmSub(${i})"><i class="fas fa-times"></i></div>
                </div>
            `).join('');
    }

    function addS() { subs.push({ c: "", n: "" }); rSubs(); rCard(); }
    function uSub(i, f, v) { subs[i][f] = v; rCard(); }
    function rmSub(i) { subs.splice(i, 1); rSubs(); rCard(); }

    function rCard() {
      const body = document.getElementById('card-body');
      body.innerHTML = '';
      body.appendChild(document.getElementById(`t-${side}`).content.cloneNode(true));
      side === 'front' ? uFront() : uBack();
    }

    function uFront() {
      applyStyles('c-collage', 'in-collage', 'st-collage');
      applyStyles('c-name', 'in-name', 'st-name');

      // Dept Text (Vertical)
      const dept = document.getElementById('c-dept');
      dept.textContent = val('in-dept');
      dept.style.fontSize = val('st-dept-size') + 'px';
      dept.style.fontWeight = val('st-dept-weight');
      dept.style.color = val('st-dept-color');
      dept.style.justifyContent = val('st-dept-align') === 'top' ? 'flex-end' : (val('st-dept-align') === 'bottom' ? 'flex-start' : 'center');

      // Image Style
      const imgWrap = document.getElementById('c-img-wrap');
      const photoSize = val('st-photo-size');
      imgWrap.style.width = photoSize + 'px';
      imgWrap.style.height = photoSize + 'px';
      imgWrap.style.borderWidth = val('st-photo-border') + 'px';
      imgWrap.style.borderColor = val('st-photo-color');
      imgWrap.style.borderRadius = val('st-photo-radius') + 'px';
      if (imgs.photo) document.getElementById('c-photo').src = imgs.photo;

      // Signature Style
      const signImg = document.getElementById('c-sign');
      signImg.style.height = val('st-sign-size') + 'px';
      signImg.style.marginTop = val('st-sign-margin') + 'px';
      if (imgs.sign) signImg.src = imgs.sign;

      document.getElementById('c-roll').textContent = val('in-roll');
      document.getElementById('c-session').textContent = val('in-session');
    }

    function uBack() {
      applyStyles('c-backtitle', 'in-backtitle', 'st-backtitle');
      document.getElementById('c-subs').innerHTML = subs.map(s => `<div>${s.c} ${s.n}</div>`).join('');

      const reSection = document.getElementById('c-return-section');
      reSection.style.textAlign = val('st-return-align');
      const reTitle = document.getElementById('c-re-title');
      reTitle.style.fontSize = val('st-return-size') + 'px';
      reTitle.style.color = val('st-return-color');

      document.getElementById('c-address').textContent = val('in-address');
      document.getElementById('c-phone').textContent = val('in-phone') || '';
    }

    function val(id) { return document.getElementById(id) ? document.getElementById(id).value : ''; }

    function applyStyles(targetId, inputId, stylePrefix) {
      const el = document.getElementById(targetId);
      if (!el) return;
      const inputVal = val(inputId);
      if (inputVal !== undefined && inputId !== null) el.textContent = inputVal;
      el.style.fontSize = val(stylePrefix + '-size') + 'px';
      el.style.fontWeight = val(stylePrefix + '-weight');
      el.style.color = val(stylePrefix + '-color');
      el.style.textAlign = val(stylePrefix + '-align');
    }

    function handleFile(inputId, key) {
      document.getElementById(inputId).addEventListener('change', function (e) {
        if (this.files && this.files[0]) {
          const reader = new FileReader();
          reader.onload = (ex) => { imgs[key] = ex.target.result; rCard(); };
          reader.readAsDataURL(this.files[0]);
        }
      });
    }

    document.addEventListener('input', (e) => {
      if (e.target.id.startsWith('in-') || e.target.id.startsWith('st-')) rCard();
    });

    handleFile('up-photo', 'photo');
    handleFile('up-sign', 'sign');
    switchSide('front');
  </script>
</body>

</html>
