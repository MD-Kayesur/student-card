<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dynamic Student Card Generator</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <style>
    :root {
      --p-color: #8b5cf6;
    }

    /* Default Purple Theme */
    body {
      background-color: #f3f4f6;
      font-family: 'Inter', sans-serif;
      transition: all 0.3s;
      margin: 0;
      padding: 0;
      min-height: 100vh;
    }

    .container-wrapper {
      display: grid;
      grid-template-columns: 500px 1fr;
      gap: 40px;
      padding: 40px;
      max-width: 1800px;
      margin: 0 auto;
      align-items: start;
    }

    .editor-container {
      background: white;
      border-radius: 20px;
      box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1);
      overflow: hidden;
    }

    .tabs {
      display: flex;
      background: #f8fafc;
      border-bottom: 2px solid #e5e7eb;
    }

    .tab-btn {
      flex: 1;
      padding: 18px;
      font-size: 11px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: #64748b;
      transition: all 0.2s;
      cursor: pointer;
      text-align: center;
    }

    .tab-btn.active {
      color: var(--p-color);
      background: white;
      border-bottom: 3.5px solid var(--p-color);
      margin-bottom: -3.5px;
    }

    .form-content {
      padding: 30px;
      max-height: 85vh;
      overflow-y: auto;
    }

    .input-group {
      margin-bottom: 20px;
      padding: 18px;
      background: #f8fafc;
      border-radius: 14px;
      border: 1px solid #f1f5f9;
      position: relative;
    }

    .group-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
    }

    .group-label {
      font-size: 11px;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--p-color);
    }

    .style-toggle-btn {
      background: #f3f0ff;
      color: var(--p-color);
      border: none;
      padding: 4px 12px;
      border-radius: 8px;
      font-size: 10px;
      font-weight: 800;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .style-toggle-btn.active {
      background: var(--p-color);
      color: white;
    }

    .main-input {
      width: 100%;
      padding: 12px 16px;
      border: 2.5px solid #e2e8f0;
      border-radius: 12px;
      font-size: 14px;
      font-weight: 600;
      background: white;
      transition: all 0.2s;
    }

    .main-input:focus {
      outline: none;
      border-color: var(--p-color);
      box-shadow: 0 0 0 4px rgba(139, 92, 246, 0.1);
    }

    .style-panel {
      display: none;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
      margin-top: 15px;
      padding-top: 15px;
      border-top: 1px dashed #cbd5e1;
    }

    .style-panel.show {
      display: grid;
    }

    .style-item {
      display: flex;
      flex-direction: column;
    }

    .style-item label {
      font-size: 9px;
      font-weight: 800;
      color: #64748b;
      margin-bottom: 6px;
      text-transform: uppercase;
    }

    .style-item input,
    .style-item select {
      width: 100%;
      height: 38px;
      padding: 6px 12px !important;
      font-size: 12px !important;
      border: 2px solid #e2e8f0 !important;
      border-radius: 8px !important;
      background: white;
      font-weight: 700;
    }

    /* Premium Card Styles (Purple Wave Theme) */
    .full {
      height: 620px;
      width: 440px;
      background-color: #d1d5db;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 24px;
      padding: 15px;
      box-shadow: 0 50px 100px -20px rgba(0, 0, 0, 0.3);
    }

    .inside {
      background-color: white;
      height: 580px;
      width: 400px;
      border-radius: 12px;
      position: relative;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      border: 1px solid #9ca3af;
    }

    /* Wavy Backgrounds */
    .wave-top {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 180px;
      background: linear-gradient(135deg, var(--p-color) 0%, #4c1d95 100%);
      z-index: 1;
      border-radius: 0 0 50% 50% / 0 0 20% 20%;
      clip-path: polygon(0 0, 100% 0, 100% 85%, 0 100%);
    }

    .wave-bottom {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 80px;
      background: linear-gradient(135deg, #4c1d95 0%, var(--p-color) 100%);
      z-index: 1;
      clip-path: polygon(0 20%, 100% 0, 100% 100%, 0 100%);
    }

    .collage-logo-img {
      height: 45px;
      margin: 25px auto 10px;
      z-index: 10;
      position: relative;
      filter: brightness(0) invert(1);
    }

    .collage-name {
      color: white;
      z-index: 10;
      position: relative;
      margin-top: 5px;
    }

    .img-section {
      display: flex;
      align-items: center;
      justify-content: center;
      margin-top: 20px;
      z-index: 10;
      position: relative;
    }

    .my-img-container {
      width: 150px;
      height: 150px;
      border-radius: 50%;
      border: 6px solid white;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
      overflow: hidden;
      background: #e5e7eb;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .my-img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .text-content {
      flex: 1;
      z-index: 10;
      position: relative;
      padding: 20px 40px;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
    }

    .details-grid {
      width: 100%;
      margin-top: 15px;
      display: flex;
      flex-direction: column;
      gap: 4px;
      border-top: 1.5px solid #f1f5f9;
      padding-top: 15px;
    }

    .sin-img-container {
      margin-top: auto;
      padding-bottom: 25px;
      z-index: 10;
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .sin-img {
      height: 35px;
      object-fit: contain;
    }

    .principal {
      color: white;
      font-size: 9px;
      font-weight: 800;
      text-transform: uppercase;
      margin-top: 5px;
      letter-spacing: 1px;
    }

    .back-content {
      z-index: 10;
      position: relative;
      padding: 20px 30px;
      display: flex;
      flex-direction: column;
      height: 100%;
    }

    .qr-code {
      width: 80px;
      height: 80px;
      background: white;
      margin: 15px auto;
      border: 2px solid #f1f5f9;
      padding: 5px;
    }

    .qr-code i {
      font-size: 60px;
      color: #1f2937;
    }

    .gen-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(15, 23, 42, 0.98);
      z-index: 1000;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      backdrop-filter: blur(20px);
      transition: all 0.5s;
      opacity: 0;
    }

    .gen-overlay.active {
      display: flex;
      opacity: 1;
    }

    .back-to-editor {
      position: absolute;
      top: 40px;
      left: 40px;
      background: rgba(255, 255, 255, 0.1);
      color: white;
      border: 1px solid rgba(255, 255, 255, 0.2);
      padding: 12px 24px;
      border-radius: 99px;
      font-weight: 900;
      cursor: pointer;
      font-size: 10px;
      transition: 0.3s;
    }

    .print-final-btn {
      margin-top: 40px;
      background: var(--p-color);
      color: white;
      padding: 20px 60px;
      border-radius: 20px;
      font-size: 14px;
      font-weight: 900;
      box-shadow: 0 10px 40px rgba(139, 92, 246, 0.4);
      cursor: pointer;
      transition: 0.3s;
      letter-spacing: 2px;
    }

    @media print {

      .container-wrapper,
      .back-to-editor,
      .print-final-btn {
        display: none !important;
      }

      .gen-overlay {
        display: flex !important;
        background: white !important;
        position: static !important;
        opacity: 1 !important;
        transform: none !important;
        backdrop-filter: none !important;
      }

      .full {
        box-shadow: none !important;
        padding: 0 !important;
        margin: 0 auto !important;
        background: transparent !important;
      }
    }
  </style>
</head>

<body>
  <div id="gen-view" class="gen-overlay"><button class="back-to-editor" onclick="closeGen()"><i
        class="fas fa-arrow-left"></i> BACK TO EDITOR</button>
    <div id="card-holder"></div><button class="print-final-btn" onclick="window.print()">CONFIRM & PRINT CARD</button>
  </div>

  <div class="container-wrapper" id="main-ui">
    <div class="editor-container">
      <div class="tabs">
        <div class="tab-btn active" onclick="switchSide('front')">FRONT CONFIG</div>
        <div class="tab-btn" onclick="switchSide('back')">BACK CONFIG</div>
      </div>

      <div class="form-content">
        <!-- Global Theme Color -->
        <div class="input-group">
          <label class="group-label">Global Theme Style</label>
          <div class="style-item"><label>Theme Accent Color</label><input type="color" id="theme-color" value="#8b5cf6"
              oninput="uTheme(this.value)"></div>
        </div>

        <div id="form-front">
          <div class="input-group" data-key="collage">
            <div class="group-header"><span class="group-label">Collage Name</span><button class="style-toggle-btn"
                onclick="toggleS('collage')"><i class="fas fa-cog"></i> STYLES</button></div><input type="text"
              id="in-collage" value="MOHASIN COLLAGE" class="main-input">
            <div class="style-panel" id="sc-collage"></div>
          </div>
          <div class="input-group" data-key="photo">
            <div class="group-header"><span class="group-label">Student Photo</span><button class="style-toggle-btn"
                onclick="toggleS('photo')"><i class="fas fa-cog"></i> STYLES</button></div><input type="file"
              id="up-photo" class="main-input">
            <div class="style-panel" id="sc-photo"></div>
          </div>
          <div class="input-group" data-key="name">
            <div class="group-header"><span class="group-label">Student Name</span><button class="style-toggle-btn"
                onclick="toggleS('name')"><i class="fas fa-cog"></i> STYLES</button></div><input type="text"
              id="in-name" value="MD Kayesur Rahman" class="main-input">
            <div class="style-panel" id="sc-name"></div>
          </div>
          <div class="grid grid-cols-2 gap-4">
            <div class="input-group" data-key="roll">
              <div class="group-header"><span class="group-label">Roll</span><button class="style-toggle-btn"
                  onclick="toggleS('roll')"><i class="fas fa-cog"></i></button></div><input type="text" id="in-roll"
                value="176" class="main-input">
              <div class="style-panel" id="sc-roll"></div>
            </div>
            <div class="input-group" data-key="session">
              <div class="group-header"><span class="group-label">Session</span><button class="style-toggle-btn"
                  onclick="toggleS('session')"><i class="fas fa-cog"></i></button></div><input type="text"
                id="in-session" value="2025-2026" class="main-input">
              <div class="style-panel" id="sc-session"></div>
            </div>
          </div>
          <div class="input-group" data-key="sign">
            <div class="group-header"><span class="group-label">Principal Signature</span><button
                class="style-toggle-btn" onclick="toggleS('sign')"><i class="fas fa-cog"></i> STYLES</button></div>
            <input type="file" id="up-sign" class="main-input">
            <div class="style-panel" id="sc-sign"></div>
          </div>
        </div>

        <div id="form-back" class="hidden">
          <div class="input-group" data-key="backtitle">
            <div class="group-header"><span class="group-label">Back Header</span><button class="style-toggle-btn"
                onclick="toggleS('backtitle')"><i class="fas fa-cog"></i> STYLES</button></div><input type="text"
              id="in-backtitle" value="Subject Code" class="main-input">
            <div class="style-panel" id="sc-backtitle"></div>
          </div>
          <div class="input-group" data-key="subs">
            <div class="group-header"><span class="group-label">Subjects</span><button class="style-toggle-btn"
                onclick="toggleS('subs')"><i class="fas fa-cog"></i> STYLES</button></div>
            <div id="sub-container"></div><button onclick="addS()"
              class="w-full py-3 bg-fuchsia-50 text-fuchsia-600 rounded-xl text-[11px] font-black mt-2 tracking-widest">+
              ADD SUBJECT</button>
            <div class="style-panel" id="sc-subs"></div>
          </div>
          <div class="input-group" data-key="return">
            <div class="group-header"><span class="group-label">Return To</span><button class="style-toggle-btn"
                onclick="toggleS('return')"><i class="fas fa-cog"></i> STYLES</button></div><input type="text"
              id="in-address" value="Syamnagor, Satkhira" class="main-input">
            <div class="style-panel" id="sc-return"></div>
          </div>
          <div class="input-group" data-key="phone">
            <div class="group-header"><span class="group-label">Phone Contact</span><button class="style-toggle-btn"
                onclick="toggleS('phone')"><i class="fas fa-cog"></i> STYLES</button></div><input type="text"
              id="in-phone" value="+8801700000000" class="main-input">
            <div class="style-panel" id="sc-phone"></div>
          </div>
        </div>

        <button onclick="openGen()"
          class="w-full bg-violet-600 text-white font-black py-5 rounded-2xl mt-4 shadow-xl hover:scale-[1.02] active:scale-[0.98] transition-all">GENERATE
          & PRINT</button>
      </div>
    </div>

    <div class="flex flex-col items-center sticky top-10" id="preview-sec">
      <div class="full" id="live-card-container">
        <div class="inside" id="card-body"></div>
      </div>
      <p class="text-gray-400 font-bold text-xs mt-10 uppercase tracking-[4px] opacity-70">Interactive Designer v5.0</p>
    </div>
  </div>

  <!-- Templates -->
  <template id="t-front">
    <div class="wave-top"></div>
    <img src="Screenshot_3.png" class="collage-logo-img">
    <div class="c-el collage-name" id="c-collage"></div>
    <div class="img-section">
      <div class="my-img-container" id="c-img-wrap"><img src="WhatsApp Image 2024-10-18 at 22.53.53_df57dcee.jpg"
          class="my-img" id="c-photo"></div>
    </div>
    <div class="text-content">
      <div class="c-el my-name" id="c-name" style="margin-top:10px"></div>
      <div class="details-grid">
        <div class="c-el" id="c-roll-line">Roll : <span id="c-roll"></span></div>
        <div class="c-el" id="c-session-line">Session : <span id="c-session"></span></div>
      </div>
    </div>
    <div id="c-sign-wrap" class="sin-img-container"><img src="sing.png" class="sin-img" id="c-sign">
      <div class="principal">Signature</div>
    </div>
    <div class="wave-bottom"></div>
  </template>

  <template id="t-back">
    <div class="wave-top" style="height:100px; opacity:0.6"></div>
    <div class="back-content">
      <div class="c-el back-title" id="c-backtitle" style="color:white; margin-bottom:20px"></div>
      <div class="c-el subjects-list" id="c-subs"></div>
      <div style="flex:1"></div>
      <div class="return-section" style="border-top:1px solid #eee; padding-top:10px">
        <div class="c-el return-title" id="c-re-title" style="font-size:11px">If Found, Please Return To</div>
        <div class="c-el address-text" id="c-address"></div>
        <div class="c-el contact-info" id="c-contacts">Phone : <span id="cc-phone"></span></div>
      </div>
      <div class="qr-code-section flex flex-col items-center">
        <div class="qr-code"><i class="fas fa-qrcode"></i></div>
        <p class="text-[7px] font-black tracking-widest opacity-40">SECURE ID VERIFIED</p>
      </div>
    </div>
    <div class="wave-bottom"></div>
  </template>

  <script>
    let side = 'front';
    let subs = [{ c: "211501", n: "History of Bangladesh" }, { c: "211001", n: "Culture of Bangladesh" }];
    let imgs = { photo: null, sign: null };
    const ds = { size: 14, weight: 600, color: '#1f2937', align: 'center', mt: 0, mb: 0, ml: 0, mr: 0, w: 0, h: 0 };
    const sc = {
      collage: { ...ds, size: 13, weight: 800, color: '#ffffff', mt: 2 },
      name: { ...ds, size: 18, weight: 900, color: '#111827', mt: 10 },
      roll: { ...ds, size: 12, weight: 700, align: 'center', mt: 2 },
      session: { ...ds, size: 12, weight: 700, align: 'center' },
      photo: { ...ds, size: 150, border: 6, color: '#ffffff', radius: 100, mt: 0 },
      sign: { ...ds, size: 35, mb: 0 },
      backtitle: { ...ds, size: 18, weight: 900, color: '#ffffff', mt: 0 },
      subs: { ...ds, size: 11, align: 'left', mt: 5, ml: 0, weight: 700 },
      return: { ...ds, size: 11, weight: 800, color: '#ef4444' },
      phone: { ...ds, size: 11, align: 'center', weight: 800 }
    };

    function uTheme(val) { document.documentElement.style.setProperty('--p-color', val); rCard(); }
    function openGen() { const card = document.getElementById('live-card-container'); const holder = document.getElementById('card-holder'); holder.innerHTML = ''; holder.appendChild(card); document.getElementById('gen-view').classList.add('active'); document.getElementById('main-ui').style.opacity = '0'; setTimeout(() => { document.getElementById('main-ui').classList.add('hidden'); }, 300); }
    function closeGen() { const card = document.getElementById('card-holder').children[0]; document.getElementById('preview-sec').insertBefore(card, document.getElementById('preview-sec').firstChild); document.getElementById('gen-view').classList.remove('active'); document.getElementById('main-ui').classList.remove('hidden'); setTimeout(() => { document.getElementById('main-ui').style.opacity = '1'; }, 50); }
    function toggleS(key) { const panel = document.getElementById(`sc-${key}`); const btn = panel.parentElement.querySelector('.style-toggle-btn'); const isHidden = panel.style.display === 'none' || panel.style.display === ''; panel.style.display = isHidden ? 'grid' : 'none'; btn.classList.toggle('active', isHidden); btn.innerHTML = isHidden ? '<i class="fas fa-times"></i> HIDE' : '<i class="fas fa-cog"></i> STYLES'; }
    function renderStyles() { Object.keys(sc).forEach(key => { const conf = sc[key]; const container = document.getElementById(`sc-${key}`); if (!container) return; container.innerHTML = `<div class="style-item"><label>Size</label><input type="number" data-key="${key}" data-prop="size" value="${conf.size}"></div><div class="style-item"><label>Weight</label><input type="number" data-key="${key}" data-prop="weight" value="${conf.weight || 600}"></div><div class="style-item"><label>Color</label><input type="color" data-key="${key}" data-prop="color" value="${conf.color || '#000000'}"></div><div class="style-item"><label>Align</label><select data-key="${key}" data-prop="align">${['left', 'center', 'right'].map(o => `<option value="${o}" ${conf.align === o ? 'selected' : ''}>${o.toUpperCase()}</option>`).join('')}</select></div><div class="style-item"><label>Width</label><input type="number" data-key="${key}" data-prop="w" value="${conf.w}"></div><div class="style-item"><label>Height</label><input type="number" data-key="${key}" data-prop="h" value="${conf.h}"></div><div class="style-item"><label>Top</label><input type="number" data-key="${key}" data-prop="mt" value="${conf.mt}"></div><div class="style-item"><label>Bottom</label><input type="number" data-key="${key}" data-prop="mb" value="${conf.mb}"></div><div class="style-item"><label>Left</label><input type="number" data-key="${key}" data-prop="ml" value="${conf.ml}"></div><div class="style-item"><label>Right</label><input type="number" data-key="${key}" data-prop="mr" value="${conf.mr}"></div>` + (key === 'photo' ? `<div class="style-item"><label>Border</label><input type="number" data-key="${key}" data-prop="border" value="${conf.border}"></div>` : ''); }); }
    function switchSide(s) { side = s; document.querySelectorAll('.tab-btn').forEach((b, i) => b.classList.toggle('active', (s === 'front' ? i === 0 : i === 1))); document.getElementById('form-front').classList.toggle('hidden', s === 'back'); document.getElementById('form-back').classList.toggle('hidden', s === 'front'); if (s === 'back') rSubs(); rCard(); }
    function rSubs() { const container = document.getElementById('sub-container'); container.innerHTML = subs.map((s, i) => `<div class="subject-row"><input type="text" value="${s.c}" oninput="uSub(${i},'c',this.value)"><input type="text" value="${s.n}" oninput="uSub(${i},'n',this.value)"><div class="remove-btn" onclick="rmSub(${i})"><i class="fas fa-times"></i></div></div>`).join(''); }
    function addS() { subs.push({ c: "", n: "" }); rSubs(); rCard(); }
    function uSub(i, f, v) { subs[i][f] = v; rCard(); }
    function rmSub(i) { subs.splice(i, 1); rSubs(); rCard(); }
    function rCard() { const body = document.getElementById('card-body'); body.innerHTML = ''; body.appendChild(document.getElementById(`t-${side}`).content.cloneNode(true)); side === 'front' ? uFront() : uBack(); }
    function uFront() {
      setStyles('c-collage', 'in-collage', 'collage'); setStyles('c-name', 'in-name', 'name'); setStyles('c-roll-line', null, 'roll'); document.getElementById('c-roll').textContent = val('in-roll'); setStyles('c-session-line', null, 'session'); document.getElementById('c-session').textContent = val('in-session');
      const imgWrap = document.getElementById('c-img-wrap'); const p = sc.photo; imgWrap.style.width = (p.w || p.size) + 'px'; imgWrap.style.height = (p.h || p.size) + 'px'; imgWrap.style.borderWidth = p.border + 'px'; imgWrap.style.borderColor = p.color; imgWrap.style.margin = `${p.mt}px ${p.mr}px ${p.mb}px ${p.ml}px`; if (imgs.photo) document.getElementById('c-photo').src = imgs.photo;
      const signImg = document.getElementById('c-sign'); const s = sc.sign; signImg.style.height = (s.h || s.size) + 'px'; signImg.parentElement.style.margin = `${s.mt}px ${s.mr}px ${s.mb}px ${s.ml}px`; if (imgs.sign) signImg.src = imgs.sign;
    }
    function uBack() {
      setStyles('c-backtitle', 'in-backtitle', 'backtitle'); setStyles('c-subs', null, 'subs'); document.getElementById('c-subs').innerHTML = subs.map(s => `<div style="font-weight:${sc.subs.weight}">${s.c} ${s.n}</div>`).join('');
      setStyles('c-re-title', null, 'return'); setStyles('c-address', 'in-address', 'return'); setStyles('c-contacts', 'in-phone', 'phone'); document.getElementById('cc-phone').textContent = val('in-phone');
    }
    function val(id) { return document.getElementById(id) ? document.getElementById(id).value : ''; }
    function setStyles(targetId, inputId, configKey) {
      const el = document.getElementById(targetId); const conf = sc[configKey]; if (inputId) el.textContent = val(inputId);
      el.style.fontSize = conf.size + 'px'; el.style.fontWeight = conf.weight; el.style.color = conf.color; el.style.textAlign = conf.align; el.style.margin = `${conf.mt}px ${conf.mr}px ${conf.mb}px ${conf.ml}px`; if (conf.w) el.style.width = conf.w + 'px'; if (conf.h) el.style.height = conf.h + 'px';
    }
    document.addEventListener('input', (e) => { const k = e.target.dataset.key; if (k) { sc[k][e.target.dataset.prop] = e.target.type === 'number' ? parseFloat(e.target.value) : e.target.value; rCard(); } else if (e.target.id.startsWith('in-')) { rCard(); } });
    document.querySelectorAll('input[type="file"]').forEach(inp => handleFile(inp.id, inp.id === 'up-photo' ? 'photo' : 'sign'));
    function handleFile(id, key) { document.getElementById(id).addEventListener('change', function () { if (this.files[0]) { const reader = new FileReader(); reader.onload = (ex) => { imgs[key] = ex.target.result; rCard(); }; reader.readAsDataURL(this.files[0]); } }); }
    renderStyles(); switchSide('front');
  </script>
</body>
